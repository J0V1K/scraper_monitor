<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Docket Scraper Monitor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>
        Docket Scraper Monitor
        <span id="loading" class="spinner" hidden></span>
      </h1>
      <div class="meta">
        <span id="generated-at"></span>
      </div>
    </header>

    <section class="aggregate">
      <div class="stat"><span class="label">Active runs</span><span class="value" id="agg-active">—</span></div>
      <div class="stat"><span class="label">Cases scraped (total)</span><span class="value" id="agg-cases">—</span></div>
      <div class="stat"><span class="label">Days complete</span><span class="value" id="agg-days-complete">—</span></div>
      <div class="stat"><span class="label">Docs in last 24h</span><span class="value" id="agg-docs-24h">—</span></div>
      <div class="stat"><span class="label">Cases in last 24h</span><span class="value" id="agg-cases-24h">—</span></div>
    </section>

    <section id="live-runs" class="live-runs"></section>

    <section class="legend">
      <span class="swatch complete"></span> complete
      <span class="swatch in-progress"></span> in progress
      <span class="swatch has-failures"></span> has failures
      <span class="swatch run-error"></span> run error
      <span class="swatch pending"></span> pending
      <span class="swatch no-cases"></span> zero cases
      <span class="swatch untouched"></span> untouched
    </section>

    <section id="scrapers"></section>

    <div id="tooltip" class="tooltip" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
